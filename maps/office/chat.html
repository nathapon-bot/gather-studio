<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Chat</title>
<script src="https://play-production-0070.up.railway.app/iframe_api.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    /* Modern blue/cyan palette */
    --accent:        #60a5fa;
    --accent-2:      #3b82f6;
    --accent-3:      #2563eb;
    --accent-glow:   rgba(96, 165, 250, 0.45);
    --accent-soft:   rgba(96, 165, 250, 0.14);
    --accent-border: rgba(96, 165, 250, 0.40);
    --gradient-accent: linear-gradient(135deg, #60a5fa 0%, #3b82f6 50%, #6366f1 100%);
    --gradient-bubble: linear-gradient(135deg, #3b82f6 0%, #6366f1 100%);
    --gradient-accent-soft: linear-gradient(135deg, rgba(96,165,250,0.16), rgba(99,102,241,0.08));

    --danger: #f87171;
    --online: #34d399;

    --bg-1: rgba(10, 11, 16, 0.82);
    --surface:        rgba(255, 255, 255, 0.035);
    --surface-hover:  rgba(255, 255, 255, 0.07);
    --surface-strong: rgba(255, 255, 255, 0.06);
    --border:         rgba(255, 255, 255, 0.07);
    --border-strong:  rgba(255, 255, 255, 0.13);

    --bubble-other: rgba(255, 255, 255, 0.07);
    --text:        #f4f4f7;
    --text-muted:  #a0a3b1;
    --text-dim:    #6c7080;

    --shadow-glow: 0 6px 20px -6px var(--accent-glow);
  }
  html, body {
    height: 100%;
    background: transparent;
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", "Sukhumvit Set", "IBM Plex Sans Thai Looped", "IBM Plex Sans Thai", "Noto Sans Thai", system-ui, sans-serif;
    font-size: 14px;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  .app {
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 100% 50% at 100% 0%, rgba(59, 130, 246, 0.18), transparent 60%),
      radial-gradient(ellipse 80% 40% at 0% 100%, rgba(99, 102, 241, 0.10), transparent 60%),
      var(--bg-1);
    backdrop-filter: blur(28px) saturate(160%);
    -webkit-backdrop-filter: blur(28px) saturate(160%);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  /* Top header */
  .top {
    flex-shrink: 0;
    padding: 14px 12px 12px;
    display: flex;
    align-items: center;
    gap: 6px;
    border-bottom: 1px solid var(--border);
    cursor: move;
    user-select: none;
  }
  .top.dragging { cursor: grabbing; }
  .top button, .top .size-toggle { cursor: pointer; }
  .top.dragging button, .top.dragging .size-toggle { cursor: grabbing; }
  .top .title {
    font-size: 16px;
    font-weight: 700;
    flex: 1;
    letter-spacing: -0.015em;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    background: linear-gradient(180deg, #ffffff 0%, #c7c9d4 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .top .title .emoji { -webkit-text-fill-color: initial; margin-right: 4px; }
  .icon-btn {
    width: 30px; height: 30px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-muted);
    border-radius: 10px;
    cursor: pointer;
    font-size: 13px;
    display: inline-flex; align-items: center; justify-content: center;
    transition: all 160ms ease;
    flex-shrink: 0;
  }
  .icon-btn:hover {
    background: var(--surface-hover); color: var(--text);
    border-color: var(--border-strong);
    transform: translateY(-1px);
  }
  .icon-btn:active { transform: translateY(0) scale(0.94); }
  .size-toggle {
    display: inline-flex;
    border: 1px solid var(--border);
    background: var(--surface);
    border-radius: 10px;
    overflow: hidden;
    height: 30px;
    flex-shrink: 0;
    padding: 2px;
    gap: 1px;
  }
  .size-toggle button {
    border: 0;
    background: transparent;
    color: var(--text-dim);
    width: 22px;
    height: 100%;
    font-size: 10.5px;
    font-weight: 600;
    cursor: pointer;
    transition: all 160ms ease;
    border-radius: 7px;
  }
  .size-toggle button:hover { color: var(--text); background: var(--surface-hover); }
  .size-toggle button.active {
    background: var(--gradient-accent);
    color: #fff;
    box-shadow: 0 2px 6px -2px var(--accent-glow);
  }
  /* Tabs */
  .tabs {
    display: flex;
    gap: 4px;
    padding: 10px 12px;
    flex-shrink: 0;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  .tab {
    flex: 1;
    padding: 7px 8px;
    background: transparent;
    color: var(--text-muted);
    border-radius: 8px;
    font-size: 12.5px;
    font-weight: 600;
    cursor: pointer;
    transition: all 160ms ease;
    text-align: center;
    border: 0;
    letter-spacing: 0.01em;
  }
  .tab:hover { background: var(--surface-hover); color: var(--text); }
  .tab.active {
    background: var(--gradient-accent);
    color: #fff;
    box-shadow: 0 4px 12px -4px var(--accent-glow);
  }
  /* Views */
  .views { flex: 1; position: relative; overflow: hidden; }
  .view {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    transition: transform 280ms cubic-bezier(0.22,1,0.36,1), opacity 200ms ease;
    background: transparent;
  }
  .view.hidden-left  { transform: translateX(-12%); opacity: 0; pointer-events: none; }
  .view.hidden-right { transform: translateX(100%);  opacity: 0; pointer-events: none; }
  /* List rows */
  .list { flex: 1; overflow-y: auto; padding: 8px 8px 12px; }
  .list::-webkit-scrollbar { width: 6px; }
  .list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }
  .list::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.16); }
  .row {
    display: flex; align-items: center; gap: 11px;
    padding: 10px;
    border-radius: 12px;
    cursor: pointer;
    transition: background 160ms ease, transform 160ms ease;
    position: relative;
  }
  .row:hover { background: var(--surface-hover); }
  .row:active { transform: scale(0.99); }
  .row .avatar {
    width: 40px; height: 40px;
    border-radius: 12px;
    background: var(--gradient-accent);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; font-weight: 700; color: #fff;
    position: relative;
    flex-shrink: 0;
    box-shadow: 0 4px 10px -4px var(--accent-glow);
    letter-spacing: -0.02em;
  }
  .row .avatar .dot {
    position: absolute; right: -2px; bottom: -2px;
    width: 12px; height: 12px;
    background: var(--online);
    border: 2.5px solid #0a0b10;
    border-radius: 50%;
    box-shadow: 0 0 0 0 rgba(52, 211, 153, 0.5);
    animation: pulse 2s ease-out infinite;
  }
  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0 rgba(52, 211, 153, 0.6); }
    70%  { box-shadow: 0 0 0 7px rgba(52, 211, 153, 0); }
    100% { box-shadow: 0 0 0 0 rgba(52, 211, 153, 0); }
  }
  .row .meta { flex: 1; min-width: 0; }
  .row .meta .name {
    font-size: 13.5px; font-weight: 600;
    display: flex; justify-content: space-between; gap: 8px; align-items: center;
    letter-spacing: -0.005em;
  }
  .row .meta .name > span:first-child {
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0;
  }
  .row .meta .name .time { font-size: 10.5px; color: var(--text-dim); font-weight: 500; flex-shrink: 0; }
  .row .meta .snippet {
    font-size: 12px; color: var(--text-muted);
    margin-top: 2px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .row .badge {
    background: var(--gradient-bubble);
    color: #fff;
    font-size: 10.5px;
    font-weight: 700;
    border-radius: 999px;
    padding: 2px 7px;
    min-width: 20px; text-align: center;
    flex-shrink: 0;
    box-shadow: 0 2px 6px -2px var(--accent-glow);
  }
  .row .actions {
    position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
    display: flex; gap: 4px;
    opacity: 0; pointer-events: none;
    transition: opacity 160ms ease;
    background: linear-gradient(90deg, transparent, rgba(18,19,28,0.96) 30%);
    padding-left: 32px;
  }
  .row:hover .actions { opacity: 1; pointer-events: auto; }
  .row .actions button {
    width: 28px; height: 28px;
    border: 1px solid var(--border-strong);
    background: var(--surface-strong);
    border-radius: 8px;
    color: var(--text);
    cursor: pointer;
    font-size: 13px;
    transition: all 160ms ease;
  }
  .row .actions button:hover {
    background: var(--gradient-accent);
    border-color: transparent;
    transform: scale(1.1);
  }
  .empty {
    color: var(--text-dim);
    text-align: center;
    padding: 48px 16px;
    font-size: 13px;
    line-height: 1.5;
  }
  /* Open room view */
  .room-header {
    display: flex; align-items: center; gap: 8px;
    padding: 12px 12px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    background: var(--surface);
  }
  .room-header .room-name {
    flex: 1; font-size: 14.5px; font-weight: 700;
    letter-spacing: -0.01em;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .messages {
    flex: 1; overflow-y: auto; padding: 16px 14px 12px;
    display: flex; flex-direction: column; gap: 10px;
  }
  .messages::-webkit-scrollbar { width: 6px; }
  .messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }
  .messages::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.16); }
  .msg {
    display: flex; flex-direction: column;
    max-width: 80%; gap: 3px;
    align-items: flex-start;
    animation: msgIn 220ms cubic-bezier(0.22,1,0.36,1);
  }
  @keyframes msgIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .msg.mine { align-self: flex-end; align-items: flex-end; }
  .msg .author { font-size: 11px; color: var(--text-dim); padding: 0 6px; font-weight: 500; }
  .msg .bubble {
    padding: 9px 13px;
    border-radius: 16px;
    font-size: 13.5px;
    line-height: 1.45;
    word-wrap: break-word;
    word-break: break-word;
    overflow-wrap: anywhere;
    display: inline-block;
    max-width: 100%;
    background: var(--bubble-other);
    color: var(--text);
    border: 1px solid var(--border);
    border-bottom-left-radius: 6px;
  }
  .msg.mine .bubble {
    background: var(--gradient-bubble);
    color: #fff;
    border: 1px solid transparent;
    border-bottom-right-radius: 6px;
    border-bottom-left-radius: 16px;
    box-shadow: 0 4px 12px -4px var(--accent-glow);
  }
  .msg .time { font-size: 10px; color: var(--text-dim); padding: 0 6px; }
  .compose {
    padding: 10px 12px 12px;
    border-top: 1px solid var(--border);
    display: flex; gap: 8px;
    flex-shrink: 0;
    background: var(--surface);
  }
  .compose input {
    flex: 1;
    background: var(--surface-strong);
    border: 1px solid var(--border-strong);
    border-radius: 12px;
    padding: 10px 14px;
    color: var(--text);
    font-family: inherit;
    font-size: 13.5px;
    outline: none;
    transition: all 160ms ease;
    min-width: 0;
  }
  .compose input::placeholder { color: var(--text-dim); }
  .compose input:focus {
    border-color: var(--accent-border);
    background: var(--surface-strong);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }
  .compose button {
    background: var(--gradient-accent);
    border: 0;
    color: #fff;
    border-radius: 12px;
    padding: 0 16px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all 160ms ease;
    font-family: inherit;
    box-shadow: 0 4px 12px -4px var(--accent-glow);
    letter-spacing: 0.02em;
  }
  .compose button:hover { transform: translateY(-1px); box-shadow: 0 6px 16px -4px var(--accent-glow); }
  .compose button:active { transform: translateY(0) scale(0.96); }
  .compose button:disabled { opacity: 0.45; cursor: not-allowed; transform: none; box-shadow: none; }
  /* Modal */
  .modal-back {
    position: fixed; inset: 0;
    background: rgba(0, 0, 0, 0.6);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
    opacity: 0; pointer-events: none;
    transition: opacity 200ms ease;
    padding: 20px;
  }
  .modal-back.open { opacity: 1; pointer-events: auto; }
  .modal {
    background:
      radial-gradient(ellipse 100% 60% at 50% 0%, rgba(59, 130, 246, 0.16), transparent 60%),
      rgba(18, 19, 28, 0.98);
    border: 1px solid var(--border-strong);
    border-radius: 18px;
    width: 100%;
    max-width: 340px;
    max-height: 80vh;
    display: flex; flex-direction: column;
    overflow: hidden;
    transform: scale(0.94);
    transition: transform 220ms cubic-bezier(0.22,1,0.36,1);
    box-shadow: 0 24px 60px -12px rgba(0, 0, 0, 0.6);
  }
  .modal-back.open .modal { transform: scale(1); }
  .modal-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
  }
  .modal-head .t { font-weight: 700; font-size: 15px; letter-spacing: -0.01em; }
  .modal-list { flex: 1; overflow-y: auto; padding: 8px; }
  .modal-list::-webkit-scrollbar { width: 6px; }
  .modal-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }
  .check-row {
    display: flex; align-items: center; gap: 11px;
    padding: 9px 10px;
    border-radius: 10px;
    cursor: pointer;
    transition: background 160ms ease;
  }
  .check-row:hover { background: var(--surface-hover); }
  .check-row .av {
    width: 30px; height: 30px;
    border-radius: 9px;
    background: var(--gradient-accent);
    color: #fff; font-weight: 700; font-size: 13px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .check-row .cb {
    width: 20px; height: 20px;
    border: 1.5px solid var(--border-strong);
    border-radius: 6px;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: all 160ms ease;
    color: #fff;
    font-size: 12px;
    font-weight: 700;
  }
  .check-row.checked .cb {
    background: var(--gradient-accent);
    border-color: transparent;
    box-shadow: 0 2px 6px -2px var(--accent-glow);
  }
  .check-row .nm { font-size: 13.5px; flex: 1; font-weight: 500; }
  .modal-foot {
    display: flex; gap: 8px;
    padding: 12px 14px;
    border-top: 1px solid var(--border);
  }
  .btn {
    flex: 1;
    padding: 10px 12px;
    border-radius: 11px;
    border: 1px solid var(--border-strong);
    background: var(--surface);
    color: var(--text);
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 160ms ease;
  }
  .btn:hover { background: var(--surface-hover); }
  .btn.primary {
    background: var(--gradient-accent);
    border-color: transparent;
    color: #fff;
    box-shadow: 0 4px 12px -4px var(--accent-glow);
  }
  .btn.primary:hover { transform: translateY(-1px); }
  .btn.primary:disabled { opacity: 0.45; cursor: not-allowed; transform: none; box-shadow: none; }
</style>
</head>
<body>
  <div class="app">
    <div class="top">
      <div class="title"><span class="emoji">💬</span>Chat</div>
      <div class="size-toggle" id="sizeToggle">
        <button data-size="S">S</button>
        <button data-size="M" class="active">M</button>
        <button data-size="L">L</button>
      </div>
      <button class="icon-btn" id="newChatBtn" title="แชทใหม่"><svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg></button>
      <button class="icon-btn" id="closeBtn" title="ปิด"><svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg></button>
    </div>

    <div class="tabs" id="tabs">
      <button class="tab active" data-tab="rooms">แชท</button>
      <button class="tab" data-tab="online">คนออนไลน์</button>
      <button class="tab" data-tab="dm">DM</button>
    </div>

    <div class="views">
      <div class="view" id="viewList">
        <div class="list" id="listEl"></div>
      </div>

      <div class="view hidden-right" id="viewRoom">
        <div class="room-header">
          <button class="icon-btn" id="backBtn"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg></button>
          <div class="room-name" id="roomName">—</div>
          <button class="icon-btn" id="inviteBtn" title="เชิญสมาชิก"><svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><path d="M20 8v6"/><path d="M23 11h-6"/></svg></button>
          <button class="icon-btn" id="closeBtn2" title="ปิด"><svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg></button>
        </div>
        <div class="messages" id="messagesEl"></div>
        <div class="compose">
          <input id="msgInput" type="text" placeholder="พิมพ์ข้อความ…" autocomplete="off" />
          <button id="sendBtn">ส่ง</button>
        </div>
      </div>
    </div>
  </div>

  <div class="modal-back" id="modalBack">
    <div class="modal">
      <div class="modal-head">
        <div class="t" id="modalTitle">เลือกสมาชิก</div>
        <button class="icon-btn" id="modalCloseBtn"><svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg></button>
      </div>
      <div class="modal-list" id="modalList"></div>
      <div class="modal-foot">
        <button class="btn" id="modalCancel">ยกเลิก</button>
        <button class="btn primary" id="modalConfirm" disabled>ยืนยัน (0)</button>
      </div>
    </div>
  </div>

<script>
(function () {
  let state = { rooms: [], users: [], currentRoomId: null, myId: null, myName: null, myCustomStatus: null, chatPosition: null, size: 'M' };
  let activeTab = 'rooms';
  let view = 'list';
  let modal = { open: false, mode: 'new', selected: new Set() };

  const $list = document.getElementById('listEl');
  const $tabs = document.querySelectorAll('#tabs .tab');
  const $viewList = document.getElementById('viewList');
  const $viewRoom = document.getElementById('viewRoom');
  const $roomName = document.getElementById('roomName');
  const $messages = document.getElementById('messagesEl');
  const $msgInput = document.getElementById('msgInput');
  const $sendBtn  = document.getElementById('sendBtn');
  const $backBtn  = document.getElementById('backBtn');
  const $modalBack = document.getElementById('modalBack');
  const $modalList = document.getElementById('modalList');
  const $modalConfirm = document.getElementById('modalConfirm');
  const $modalCancel = document.getElementById('modalCancel');
  const $modalCloseBtn = document.getElementById('modalCloseBtn');
  const $modalTitle = document.getElementById('modalTitle');
  const $sizeToggle = document.getElementById('sizeToggle');

  function broadcast(payload) {
    try {
      if (window.WA && WA.event && typeof WA.event.broadcast === 'function') {
        WA.event.broadcast('mimo-chat', payload);
      }
    } catch (e) { console.warn('broadcast failed', e); }
  }
  function escapeHtml(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }
  function initials(name) { if (!name) return '?'; return String(name).trim().charAt(0).toUpperCase(); }
  function fmtTime(t) {
    if (!t) return '';
    if (typeof t === 'string') return t;
    try { return new Date(t).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }); }
    catch { return ''; }
  }

  function renderList() {
    let items = [];
    if (activeTab === 'rooms') items = (state.rooms || []).filter(r => !r.isDm);
    else if (activeTab === 'dm') items = (state.rooms || []).filter(r => r.isDm);
    else if (activeTab === 'online') {
      items = (state.users || []).filter(u => u.online && u.id !== state.myId).map(u => ({
        id: 'user:' + u.id, userId: u.id, name: u.name,
        snippet: u.customStatus ? `${u.customStatus.emoji} ${u.customStatus.label}` : 'ออนไลน์',
        online: true, isUserRow: true,
      }));
      if (state.myId) {
        const cs = state.myCustomStatus;
        items.unshift({
          id: 'me', userId: state.myId,
          name: (state.myName || 'คุณ') + ' (คุณ)',
          snippet: cs ? `${cs.emoji} ${cs.label}` : 'ออนไลน์',
          online: true, isUserRow: true, isSelf: true,
        });
      }
    }
    if (!items.length) {
      const empty = activeTab === 'rooms' ? 'ยังไม่มีห้องแชท'
        : activeTab === 'dm' ? 'ยังไม่มี Direct Message' : 'ไม่มีคนออนไลน์';
      $list.innerHTML = `<div class="empty">${empty}</div>`;
      return;
    }
    $list.innerHTML = '';
    items.forEach(it => {
      const row = document.createElement('div');
      row.className = 'row' + (it.isSelf ? ' self' : '');
      const av = `<div class="avatar">${escapeHtml(it.avatar || initials(it.name))}${it.online ? '<span class="dot"></span>' : ''}</div>`;
      const time = it.time ? `<span class="time">${escapeHtml(fmtTime(it.time))}</span>` : '';
      const badge = it.unread ? `<div class="badge">${it.unread > 99 ? '99+' : it.unread}</div>` : '';
      const actions = it.isSelf ? '' : `
        <div class="actions">
          <button data-act="walk" title="เดินไปหา user คนนี้">ไป</button>
          <button data-act="call" title="โทรหา user คนนี้">โทร</button>
          <button data-act="dm"   title="ส่งข้อความหา user คนนี้">DM</button>
        </div>`;
      row.innerHTML = `
        ${av}
        <div class="meta">
          <div class="name"><span>${escapeHtml(it.name || '—')}</span>${time}</div>
          <div class="snippet">${escapeHtml(it.snippet || '')}</div>
        </div>
        ${badge}
        ${actions}`;
      row.addEventListener('click', e => {
        if (it.isSelf) return;
        const btn = e.target.closest('button[data-act]');
        if (btn) {
          e.stopPropagation();
          const act = btn.getAttribute('data-act');
          const userId = it.userId || it.id;
          if (act === 'walk') broadcast({ type: 'walkTo', userId });
          else if (act === 'call') broadcast({ type: 'callUser', userId });
          else if (act === 'dm')   broadcast({ type: 'openDm', userId, userName: it.name });
          return;
        }
        if (it.isUserRow) broadcast({ type: 'openDm', userId: it.userId, userName: it.name });
        else { broadcast({ type: 'selectRoom', roomId: it.id }); openRoomView(it); }
      });
      $list.appendChild(row);
    });
  }

  function getRoom(id) { return (state.rooms || []).find(r => r.id === id); }

  function renderMessages(room) {
    const msgs = (room && room.messages) || [];
    if (!msgs.length) {
      $messages.innerHTML = `<div class="empty">ยังไม่มีข้อความ<br>พิมพ์เพื่อเริ่มการสนทนา ✨</div>`;
      return;
    }
    $messages.innerHTML = '';
    msgs.forEach(m => {
      const mine = m.userId === state.myId || m.mine === true;
      const el = document.createElement('div');
      el.className = 'msg' + (mine ? ' mine' : '');
      const author = mine ? '' : `<div class="author">${escapeHtml(m.author || m.userName || '')}</div>`;
      el.innerHTML = `${author}<div class="bubble">${escapeHtml(m.text || '')}</div><div class="time">${escapeHtml(fmtTime(m.time))}</div>`;
      $messages.appendChild(el);
    });
    $messages.scrollTop = $messages.scrollHeight;
  }

  function openRoomView(roomLike) {
    view = 'room';
    state.currentRoomId = roomLike.id;
    const r = getRoom(roomLike.id) || roomLike;
    $roomName.textContent = r.name || '—';
    renderMessages(r);
    $viewList.classList.add('hidden-left');
    $viewRoom.classList.remove('hidden-right');
    setTimeout(() => $msgInput.focus(), 280);
  }
  function openListView() {
    view = 'list';
    $viewRoom.classList.add('hidden-right');
    $viewList.classList.remove('hidden-left');
  }

  $tabs.forEach(t => t.addEventListener('click', () => {
    $tabs.forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    activeTab = t.getAttribute('data-tab');
    renderList();
  }));

  function sendMessage() {
    const text = $msgInput.value.trim();
    if (!text || !state.currentRoomId) return;
    broadcast({ type: 'sendMessage', roomId: state.currentRoomId, text });
    $msgInput.value = '';
  }
  $sendBtn.addEventListener('click', sendMessage);
  $msgInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
  $msgInput.addEventListener('focus', () => broadcast({ type: 'typingFocus', focused: true }));
  $msgInput.addEventListener('blur',  () => broadcast({ type: 'typingFocus', focused: false }));

  document.getElementById('closeBtn').addEventListener('click', () => broadcast({ type: 'close' }));
  document.getElementById('closeBtn2').addEventListener('click', () => broadcast({ type: 'close' }));
  $backBtn.addEventListener('click', openListView);

  $sizeToggle.querySelectorAll('button').forEach(b => {
    b.addEventListener('click', () => {
      const s = b.getAttribute('data-size');
      $sizeToggle.querySelectorAll('button').forEach(x => x.classList.toggle('active', x === b));
      state.size = s;
      broadcast({ type: 'resize', size: s });
    });
  });

  function openModal(mode) {
    modal.open = true;
    modal.mode = mode;
    modal.selected = new Set();
    $modalTitle.textContent = mode === 'invite' ? 'เชิญเข้าห้อง' : 'สร้างแชทใหม่';
    renderModal();
    $modalBack.classList.add('open');
  }
  function closeModal() { modal.open = false; $modalBack.classList.remove('open'); }
  function renderModal() {
    $modalList.innerHTML = '';
    const users = (state.users || []).filter(u => u.id !== state.myId);
    if (!users.length) { $modalList.innerHTML = `<div class="empty">ไม่มีผู้ใช้</div>`; }
    else {
      users.forEach(u => {
        const row = document.createElement('div');
        const checked = modal.selected.has(u.id);
        row.className = 'check-row' + (checked ? ' checked' : '');
        row.innerHTML = `
          <div class="av">${escapeHtml(initials(u.name || u.id))}</div>
          <div class="nm">${escapeHtml(u.name || u.id)}</div>
          <div class="cb">${checked ? '✓' : ''}</div>`;
        row.addEventListener('click', () => {
          if (modal.selected.has(u.id)) modal.selected.delete(u.id);
          else modal.selected.add(u.id);
          renderModal();
        });
        $modalList.appendChild(row);
      });
    }
    const n = modal.selected.size;
    $modalConfirm.disabled = n === 0;
    $modalConfirm.textContent = `ยืนยัน (${n})`;
  }
  document.getElementById('newChatBtn').addEventListener('click', () => openModal('new'));
  document.getElementById('inviteBtn').addEventListener('click', () => openModal('invite'));
  $modalCancel.addEventListener('click', closeModal);
  $modalCloseBtn.addEventListener('click', closeModal);
  $modalBack.addEventListener('click', e => { if (e.target === $modalBack) closeModal(); });
  $modalConfirm.addEventListener('click', () => {
    const ids = Array.from(modal.selected);
    if (!ids.length) return;
    if (modal.mode === 'invite' && state.currentRoomId) {
      broadcast({ type: 'inviteToRoom', roomId: state.currentRoomId, memberIds: ids });
    } else {
      broadcast({ type: 'createGroup', memberIds: ids });
    }
    closeModal();
  });

  function applyState(data) {
    if (!data) return;
    if (Array.isArray(data.rooms)) state.rooms = data.rooms;
    if (Array.isArray(data.users)) state.users = data.users;
    if ('myId' in data) state.myId = data.myId;
    if ('myName' in data) state.myName = data.myName;
    if ('myCustomStatus' in data) state.myCustomStatus = data.myCustomStatus;
    if (data.chatPosition && Number.isFinite(data.chatPosition.x) && Number.isFinite(data.chatPosition.y)) {
      state.chatPosition = data.chatPosition;
    }
    if ('size' in data && data.size) {
      state.size = data.size;
      $sizeToggle.querySelectorAll('button').forEach(x =>
        x.classList.toggle('active', x.getAttribute('data-size') === state.size));
    }
    if ('currentRoomId' in data) state.currentRoomId = data.currentRoomId;
    renderList();
    if (view === 'room' && state.currentRoomId) {
      const r = getRoom(state.currentRoomId);
      if (r) { $roomName.textContent = r.name || '—'; renderMessages(r); }
    } else if (state.currentRoomId && view === 'list') {
      const r = getRoom(state.currentRoomId);
      if (r) openRoomView(r);
    }
  }

  renderList();

  // ── DRAG: move the chat panel by holding the top header ─────────────
  (function initDrag() {
    const $top = document.querySelector('.top');
    if (!$top) return;
    const POS_KEY = 'mimo-chat-pos';

    let chatX = null, chatY = null;
    try {
      const saved = JSON.parse(localStorage.getItem(POS_KEY) || 'null');
      if (saved && Number.isFinite(saved.x) && Number.isFinite(saved.y)) {
        chatX = saved.x; chatY = saved.y;
      }
    } catch (e) {}

    // Push saved position to script.js once channel is up.
    function pushPos() {
      if (chatX != null) broadcast({ type: 'setChatPosition', x: chatX, y: chatY });
    }
    if (chatX != null) { pushPos(); setTimeout(pushPos, 400); setTimeout(pushPos, 1500); }

    let dragging = false;
    let lastX = 0, lastY = 0;
    let rafId = 0;

    function flush() {
      rafId = 0;
      broadcast({ type: 'setChatPosition', x: chatX, y: chatY });
    }

    $top.addEventListener('mousedown', (e) => {
      if (e.target.closest('button, .icon-btn, .size-toggle')) return;
      // Initialize from current state pushed by script.js, else last known / fallback.
      if (state.chatPosition) { chatX = state.chatPosition.x; chatY = state.chatPosition.y; }
      else if (chatX == null) { chatX = 1300; chatY = 100; }
      dragging = true;
      lastX = e.clientX; lastY = e.clientY;
      $top.classList.add('dragging');
      e.preventDefault();
    });

    window.addEventListener('mousemove', (e) => {
      if (!dragging) return;
      chatX += e.clientX - lastX;
      chatY += e.clientY - lastY;
      lastX = e.clientX; lastY = e.clientY;
      if (!rafId) rafId = requestAnimationFrame(flush);
    });

    window.addEventListener('mouseup', () => {
      if (!dragging) return;
      dragging = false;
      $top.classList.remove('dragging');
      if (rafId) { cancelAnimationFrame(rafId); rafId = 0; flush(); }
      try { localStorage.setItem(POS_KEY, JSON.stringify({ x: chatX, y: chatY })); } catch (e) {}
    });

    document.addEventListener('selectstart', (e) => { if (dragging) e.preventDefault(); });
  })();

  if (window.WA && typeof WA.onInit === 'function') {
    WA.onInit().then(() => {
      try {
        WA.event.on('mimo-chat-state').subscribe(ev => {
          applyState(ev && ev.data ? ev.data : ev);
        });
      } catch (e) { console.warn('subscribe failed', e); }
      broadcast({ type: 'ready' });
    }).catch(err => console.warn('WA.onInit failed', err));
  }
})();
</script>
</body>
</html>
