<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Nameplates</title>
<script src="https://play-production-0070.up.railway.app/iframe_api.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%;
    background: transparent;
    overflow: hidden;
    pointer-events: none;
    font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", "Sukhumvit Set", "IBM Plex Sans Thai Looped", "IBM Plex Sans Thai", "Noto Sans Thai", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  #stage {
    position: fixed;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
  }
  .np {
    position: absolute;
    top: 0; left: 0;
    transform: translate3d(-9999px, -9999px, 0);
    will-change: transform, opacity;
    pointer-events: none;
    user-select: none;
    opacity: 0;
    animation: npIn 220ms cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
  }
  @keyframes npIn {
    0%   { opacity: 0; transform: translate3d(var(--x), calc(var(--y) + 8px), 0) scale(0.82); }
    100% { opacity: 1; transform: translate3d(var(--x), var(--y), 0) scale(1); }
  }
  .np-pill {
    position: relative;
    transform: translate(-50%, -100%);
    padding: 4px 11px 4px 11px;
    border-radius: 999px;
    color: #fff;
    font-size: 11.5px;
    font-weight: 700;
    line-height: 1.25;
    letter-spacing: 0.005em;
    white-space: nowrap;
    text-shadow: 0 1px 2px rgba(0, 0, 0, 0.55), 0 0 1px rgba(0, 0, 0, 0.6);
    max-width: 200px;
    overflow: hidden;
    text-overflow: ellipsis;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
  }
  .np-pill::after {
    content: "";
    position: absolute;
    left: 50%;
    bottom: -5px;
    width: 0; height: 0;
    transform: translateX(-50%);
    border-left: 5px solid transparent;
    border-right: 5px solid transparent;
    border-top: 5px solid currentColor;
  }
  /* Mine — modern blue gradient */
  .np.mine .np-pill {
    background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 50%, #6366f1 100%);
    color: #3b82f6;
    box-shadow:
      0 4px 12px rgba(59, 130, 246, 0.45),
      0 0 0 1.5px rgba(255, 255, 255, 0.20) inset,
      0 1px 0 rgba(255, 255, 255, 0.25) inset;
  }
  /* Others — modern coral/red gradient */
  .np.others .np-pill {
    background: linear-gradient(135deg, #fb7185 0%, #ef4444 50%, #dc2626 100%);
    color: #ef4444;
    box-shadow:
      0 4px 12px rgba(239, 68, 68, 0.40),
      0 0 0 1.5px rgba(255, 255, 255, 0.18) inset,
      0 1px 0 rgba(255, 255, 255, 0.25) inset;
  }
  .np .np-pill > span { color: #fff; display: inline-block; }
</style>
</head>
<body>
  <div id="stage"></div>
<script>
(function () {
  const stage = document.getElementById('stage');
  let desks = [];
  let cam = { x: 0, y: 0, zoom: 1, viewportW: window.innerWidth, viewportH: window.innerHeight };
  let nodes = new Map();
  let needsRender = false;
  let lastSig = '';

  function syncDom() {
    const keep = new Set(desks.map(d => d.name));
    for (const [name, rec] of nodes) {
      if (!keep.has(name)) { rec.el.remove(); nodes.delete(name); }
    }
    desks.forEach(d => {
      let rec = nodes.get(d.name);
      const mine = !!d.isMine;
      const text = d.ownerName || '';
      if (!rec) {
        const el = document.createElement('div');
        el.className = 'np ' + (mine ? 'mine' : 'others');
        el.innerHTML = `<div class="np-pill"><span></span></div>`;
        const span = el.querySelector('span');
        span.textContent = text;
        stage.appendChild(el);
        rec = { el, span, mine, text };
        nodes.set(d.name, rec);
      } else {
        if (rec.mine !== mine) {
          rec.el.classList.toggle('mine', mine);
          rec.el.classList.toggle('others', !mine);
          rec.mine = mine;
        }
        if (rec.text !== text) { rec.span.textContent = text; rec.text = text; }
      }
    });
  }

  function project(wx, wy) {
    const z = cam.zoom || 1;
    return { x: (wx - cam.x) * z, y: (wy - cam.y) * z };
  }

  function renderFrame() {
    needsRender = false;
    const vw = cam.viewportW || window.innerWidth;
    const vh = cam.viewportH || window.innerHeight;
    const margin = 80;
    desks.forEach(d => {
      const rec = nodes.get(d.name);
      if (!rec) return;
      const p = project(d.cx, d.cy);
      const onScreen = p.x > -margin && p.x < vw + margin && p.y > -margin && p.y < vh + margin;
      if (!onScreen) {
        rec.el.style.transform = 'translate3d(-9999px,-9999px,0)';
        return;
      }
      const tx = p.x.toFixed(1) + 'px';
      const ty = p.y.toFixed(1) + 'px';
      rec.el.style.setProperty('--x', tx);
      rec.el.style.setProperty('--y', ty);
      rec.el.style.transform = `translate3d(${tx}, ${ty}, 0)`;
    });
  }

  function scheduleRender() {
    if (needsRender) return;
    needsRender = true;
    requestAnimationFrame(renderFrame);
  }

  window.addEventListener('resize', () => {
    cam.viewportW = window.innerWidth;
    cam.viewportH = window.innerHeight;
    scheduleRender();
  });

  function broadcast(payload) {
    try {
      if (window.WA && WA.event && typeof WA.event.broadcast === 'function') {
        WA.event.broadcast('mimo-np', payload);
      }
    } catch (e) { console.warn('broadcast failed', e); }
  }

  function applyEvent(data) {
    if (!data || !data.type) return;
    if (data.type === 'bookings') {
      const next = Array.isArray(data.desks) ? data.desks : [];
      const sig = next.map(d => `${d.name}|${d.cx}|${d.cy}|${d.ownerName||''}|${d.isMine?1:0}`).join('~');
      desks = next;
      if (sig !== lastSig) { lastSig = sig; syncDom(); }
      scheduleRender();
    } else if (data.type === 'camera') {
      if (data.cam) {
        cam.x = +data.cam.x || 0;
        cam.y = +data.cam.y || 0;
        cam.zoom = +data.cam.zoom || 1;
        if (data.cam.viewportW) cam.viewportW = +data.cam.viewportW;
        if (data.cam.viewportH) cam.viewportH = +data.cam.viewportH;
      }
      scheduleRender();
    }
  }

  if (window.WA && typeof WA.onInit === 'function') {
    WA.onInit().then(() => {
      try {
        WA.event.on('mimo-np-state').subscribe(ev => {
          applyEvent(ev && ev.data ? ev.data : ev);
        });
      } catch (e) { console.warn('subscribe failed', e); }
      broadcast({ type: 'ready' });
    }).catch(err => console.warn('WA.onInit failed', err));
  }
})();
</script>
</body>
</html>
