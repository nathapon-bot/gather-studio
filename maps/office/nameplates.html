<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>Desk Nameplates</title>
<script src="https://play-production-0070.up.railway.app/iframe_api.js"></script>
<style>
    html, body {
        margin: 0; padding: 0; width: 100%; height: 100%;
        background: transparent; overflow: hidden;
        pointer-events: none;        /* let clicks pass through to the game */
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    }
    .label {
        position: absolute;
        transform: translate(-50%, -100%);
        padding: 2px 8px;
        border-radius: 10px;
        font-size: 11px;
        font-weight: 600;
        color: #fff;
        white-space: nowrap;
        line-height: 1;
        text-shadow: 0 1px 2px rgba(0,0,0,0.9);
        box-shadow: 0 2px 6px rgba(0,0,0,0.35);
        will-change: transform;
        user-select: none;
        opacity: 0;
        transition: opacity 160ms ease-out;
        pointer-events: none;
    }
    .label.visible { opacity: 1; }
    .label.mine  { background: rgba(74,163,255,0.92); }
    .label.other { background: rgba(231,76,60,0.92); }
    /* Small triangular pointer under the label, pointing down to the desk */
    .label::after {
        content: ""; position: absolute; left: 50%; bottom: -4px;
        width: 6px; height: 6px;
        background: inherit;
        transform: translateX(-50%) rotate(45deg);
        border-radius: 1px;
        box-shadow: 2px 2px 3px rgba(0,0,0,0.25);
    }
</style>
</head>
<body>
<div id="root"></div>
<script>
"use strict";
/*
 * Desk nameplates overlay.
 *
 * Receives from parent (script.js) via postMessage:
 *   { __np__: true, type: 'bookings', desks: [{name, label, cx, cy, ownerName, isMine}] }
 *   { __np__: true, type: 'camera',   cam: { x, y, width, height, zoom } }
 *
 * Projects world coords to screen via camera scroll/zoom and moves the labels
 * with a single rAF-batched transform update — cheap even with many desks.
 */
const root = document.getElementById('root');
const labels = new Map();           // deskName → { el, desk, ownerName, isMine }
let   cam = null;

function escapeHtml(s) {
    return String(s == null ? '' : s)
        .replaceAll('&','&amp;').replaceAll('<','&lt;')
        .replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#39;');
}

function applyBookings(desks) {
    const seen = new Set();
    for (const d of desks) {
        seen.add(d.name);
        let entry = labels.get(d.name);
        if (!entry) {
            const el = document.createElement('div');
            el.className = 'label';
            root.appendChild(el);
            entry = { el };
            labels.set(d.name, entry);
        }
        const classes = ['label'];
        classes.push(d.isMine ? 'mine' : 'other');
        entry.el.className = classes.join(' ');
        entry.el.textContent = d.ownerName || '—';
        entry.cx = d.cx;
        entry.cy = d.cy;
        entry.isMine = d.isMine;
    }
    // Remove labels for desks no longer booked
    for (const [name, entry] of [...labels]) {
        if (!seen.has(name)) {
            entry.el.remove();
            labels.delete(name);
        }
    }
    scheduleFrame();
}

// Batch position updates to one per animation frame
let frameScheduled = false;
function scheduleFrame() {
    if (frameScheduled) return;
    frameScheduled = true;
    requestAnimationFrame(() => {
        frameScheduled = false;
        repositionAll();
    });
}

// The script.js parent sizes this iframe at 100% width but with 100px top +
// 100px bottom margin to clear the ☰ menu and action bar. We reconstruct the
// full viewport height by reading the iframe's offset via getBoundingClientRect
// through WA — but since we're cross-origin, we just infer from our own height
// knowing parent_vh ≈ our height + 200px.
const TOP_MARGIN_PX = 100;

function repositionAll() {
    if (!cam) return;
    const iframeVW = window.innerWidth;
    const iframeVH = window.innerHeight;
    const parentVH = iframeVH + TOP_MARGIN_PX * 2;
    const topOffset = TOP_MARGIN_PX;

    const margin = 40;
    for (const entry of labels.values()) {
        const sx = (entry.cx - cam.x) / cam.width  * iframeVW;
        const syParent = (entry.cy - cam.y) / cam.height * parentVH;
        const sy = syParent - topOffset;
        if (sx < -margin || sx > iframeVW + margin || sy < -margin || sy > iframeVH + margin) {
            if (entry.el.classList.contains('visible')) entry.el.classList.remove('visible');
            continue;
        }
        // Labels sit ~12px above the desk tile centre
        entry.el.style.transform = `translate(${sx}px, ${sy - 12}px) translate(-50%, -100%)`;
        if (!entry.el.classList.contains('visible')) entry.el.classList.add('visible');
    }
}

window.addEventListener('resize', scheduleFrame);

// Listen for updates via WA's event system (parent.postMessage doesn't reach
// the sibling script.js iframe under WA's sandbox).
const EVT_NP_STATE = 'mimo-np-state';
const EVT_NP_OUT   = 'mimo-np';
let _myPlayerId = null;

WA.onInit().then(() => {
    try { _myPlayerId = WA.player.playerId; } catch(e){}

    // Camera updates are high-frequency (~60fps). Subscribe directly INSIDE
    // this iframe — no WA.event round-trip, no server fan-out, no 14 other
    // users' clients wasting CPU filtering irrelevant broadcasts.
    try {
        WA.camera.onCameraUpdate().subscribe((c) => {
            cam = c;
            scheduleFrame();
        });
    } catch(e) { console.warn('[nameplates] camera subscribe failed', e); }

    // Only booking updates come via WA.event (low frequency)
    WA.event.on(EVT_NP_STATE).subscribe((ev) => {
        if (ev.senderId !== _myPlayerId) return;
        const d = ev.data || {};
        if (d.type === 'bookings') { applyBookings(d.desks || []); return; }
        // (camera type retained for backward compat but no longer used here)
        if (d.type === 'camera')   { cam = d.cam; scheduleFrame(); return; }
    });
    // Tell script.js we're ready to receive booking state
    try { WA.event.broadcast(EVT_NP_OUT, { type: 'ready' }); } catch(e){}
}).catch((e) => console.warn('[nameplates] WA.onInit failed', e));
</script>
</body>
</html>
