<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>แต่งโต๊ะ</title>
<script src="https://play-production-0070.up.railway.app/iframe_api.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    /* Modern violet/indigo palette */
    --accent:        #a78bfa;
    --accent-2:      #8b5cf6;
    --accent-glow:   rgba(167, 139, 250, 0.55);
    --accent-soft:   rgba(167, 139, 250, 0.14);
    --accent-border: rgba(167, 139, 250, 0.45);
    --gradient-accent: linear-gradient(135deg, #a78bfa 0%, #8b5cf6 50%, #6366f1 100%);
    --gradient-accent-soft: linear-gradient(135deg, rgba(167,139,250,0.18), rgba(99,102,241,0.10));

    --danger:        #f87171;
    --danger-soft:   rgba(248, 113, 113, 0.10);
    --danger-border: rgba(248, 113, 113, 0.40);

    /* Surface layers — near black + subtle blue tint */
    --bg-1: rgba(11, 12, 18, 0.78);
    --bg-2: rgba(18, 19, 28, 0.65);
    --surface:        rgba(255, 255, 255, 0.035);
    --surface-hover:  rgba(255, 255, 255, 0.07);
    --surface-strong: rgba(255, 255, 255, 0.055);
    --border:         rgba(255, 255, 255, 0.07);
    --border-strong:  rgba(255, 255, 255, 0.12);

    --text:        #f4f4f7;
    --text-muted:  #a0a3b1;
    --text-dim:    #6c7080;

    --shadow-glow: 0 8px 24px -8px var(--accent-glow);
    --shadow-soft: 0 4px 16px rgba(0, 0, 0, 0.25);
  }
  html, body {
    height: 100%;
    background: transparent;
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", "Sukhumvit Set", "IBM Plex Sans Thai Looped", "IBM Plex Sans Thai", "Noto Sans Thai", system-ui, sans-serif;
    font-size: 14px;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  .panel {
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 120% 60% at 100% 0%, rgba(139, 92, 246, 0.18), transparent 60%),
      radial-gradient(ellipse 80% 50% at 0% 100%, rgba(99, 102, 241, 0.12), transparent 60%),
      var(--bg-1);
    backdrop-filter: blur(28px) saturate(160%);
    -webkit-backdrop-filter: blur(28px) saturate(160%);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 20px 18px 16px;
    gap: 18px;
    animation: slideIn 320ms cubic-bezier(0.22, 1, 0.36, 1);
    overflow: hidden;
  }
  @keyframes slideIn {
    from { transform: translateX(24px); opacity: 0; }
    to   { transform: translateX(0);    opacity: 1; }
  }

  /* Header */
  .header { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
  .header h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1.15;
    background: linear-gradient(180deg, #ffffff 0%, #c7c9d4 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    color: transparent;
  }
  .header h1 .emoji {
    -webkit-text-fill-color: initial;
    color: initial;
    margin-right: 4px;
  }
  .header .subtitle {
    color: var(--text-muted);
    font-size: 12.5px;
    margin-top: 5px;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 3px 9px 3px 7px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 999px;
  }
  .close-btn {
    width: 34px; height: 34px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-muted);
    border-radius: 11px;
    cursor: pointer;
    font-size: 14px;
    display: flex; align-items: center; justify-content: center;
    transition: transform 160ms ease, background 160ms ease, color 160ms ease, border-color 160ms ease;
    flex-shrink: 0;
  }
  .close-btn:hover {
    background: var(--surface-hover);
    color: var(--text);
    border-color: var(--border-strong);
    transform: rotate(90deg);
  }
  .close-btn:active { transform: rotate(90deg) scale(0.92); }

  /* Section labels */
  .section-label {
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--text-dim);
    margin-bottom: 10px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-label::after {
    content: "";
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, var(--border), transparent);
  }

  /* Slots */
  .slots { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 10px; }
  .slot {
    position: relative;
    aspect-ratio: 1;
    min-width: 0;
    border: 1.5px dashed var(--border-strong);
    border-radius: 16px;
    background: var(--surface);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 5px;
    cursor: pointer;
    transition: transform 200ms cubic-bezier(0.22,1,0.36,1), border-color 180ms ease, background 180ms ease, box-shadow 220ms ease;
    color: var(--text-dim);
    font-size: 12px;
    padding: 6px;
    text-align: center;
    overflow: hidden;
  }
  .slot::before {
    content: "";
    position: absolute;
    inset: 0;
    background: var(--gradient-accent-soft);
    opacity: 0;
    transition: opacity 220ms ease;
    pointer-events: none;
  }
  .slot .icon { font-size: 30px; line-height: 1; position: relative; }
  .slot .name { font-size: 11px; line-height: 1.2; position: relative; font-weight: 500; }
  .slot:hover {
    border-color: var(--accent-border);
    transform: translateY(-3px);
    box-shadow: var(--shadow-glow);
    color: var(--text-muted);
  }
  .slot:hover::before { opacity: 0.5; }
  .slot.filled {
    border-style: solid;
    border-color: var(--accent-border);
    color: var(--text);
  }
  .slot.filled::before { opacity: 1; }
  .slot:active { transform: translateY(-1px) scale(0.97); }

  /* Palette */
  .palette { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 8px; }
  .item {
    position: relative;
    aspect-ratio: 1;
    min-width: 0;
    border: 1.5px solid var(--border);
    background: var(--surface);
    border-radius: 14px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    cursor: pointer;
    transition: transform 160ms ease, background 160ms ease, border-color 160ms ease, box-shadow 220ms ease;
    color: var(--text);
    font-size: 11.5px;
    padding: 4px;
    overflow: hidden;
  }
  .item::before {
    content: "";
    position: absolute;
    inset: 0;
    background: var(--gradient-accent-soft);
    opacity: 0;
    transition: opacity 200ms ease;
    pointer-events: none;
  }
  .item .icon { font-size: 24px; line-height: 1; position: relative; transition: transform 200ms ease; }
  .item .lbl  { position: relative; font-weight: 500; }
  .item:hover {
    background: var(--surface-hover);
    border-color: var(--border-strong);
    transform: translateY(-2px);
  }
  .item:hover .icon { transform: scale(1.08); }
  .item:active { transform: translateY(0) scale(0.94); }
  .item.selected {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft), var(--shadow-glow);
  }
  .item.selected::before { opacity: 1; }
  .item.remove { color: #fca5a5; }
  .item.remove::before { background: linear-gradient(135deg, rgba(248,113,113,0.18), rgba(220,38,38,0.08)); }
  .item.remove:hover { border-color: var(--danger-border); }
  .item.remove.selected {
    border-color: var(--danger);
    box-shadow: 0 0 0 3px var(--danger-soft), 0 8px 24px -8px rgba(248, 113, 113, 0.5);
    color: #fecaca;
  }

  /* Status */
  .status {
    margin-top: auto;
    padding: 12px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    color: var(--text-muted);
    font-size: 12.5px;
    line-height: 1.45;
    transition: all 220ms ease;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .status::before {
    content: "";
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--text-dim);
    flex-shrink: 0;
    box-shadow: 0 0 0 0 transparent;
    transition: all 220ms ease;
  }
  .status.active {
    color: var(--text);
    border-color: var(--accent-border);
    background: linear-gradient(135deg, rgba(167,139,250,0.10), rgba(99,102,241,0.05));
  }
  .status.active::before {
    background: var(--accent);
    box-shadow: 0 0 0 4px var(--accent-soft);
    animation: pulseDot 1.6s ease-out infinite;
  }
  .status.danger {
    color: #fecaca;
    border-color: var(--danger-border);
    background: linear-gradient(135deg, rgba(248,113,113,0.10), rgba(220,38,38,0.04));
  }
  .status.danger::before {
    background: var(--danger);
    box-shadow: 0 0 0 4px var(--danger-soft);
    animation: pulseDot 1.6s ease-out infinite;
  }
  @keyframes pulseDot {
    0%   { box-shadow: 0 0 0 0 currentColor; }
    70%  { box-shadow: 0 0 0 8px transparent; }
    100% { box-shadow: 0 0 0 0 transparent; }
  }
  .section + .section { margin-top: 2px; }
</style>
</head>
<body>
  <div class="panel">
    <div class="header">
      <div>
        <h1><span class="emoji">🎨</span>แต่งโต๊ะ</h1>
        <div class="subtitle"><span id="subtitle">กำลังโหลด…</span></div>
      </div>
      <button class="close-btn" id="closeBtn" aria-label="ปิด">✕</button>
    </div>

    <div class="section">
      <div class="section-label">ช่องวางของ</div>
      <div class="slots" id="slots"></div>
    </div>

    <div class="section">
      <div class="section-label">ของตกแต่ง</div>
      <div class="palette" id="palette"></div>
    </div>

    <div class="status" id="status"><span id="statusText">เลือกของตกแต่งก่อน แล้วคลิกช่องเพื่อวาง</span></div>
  </div>

<script>
(function () {
  const ITEMS = [
    { key: 'plant',    icon: '🪴', name: 'ต้นไม้' },
    { key: 'lamp',     icon: '💡', name: 'โคมไฟ' },
    { key: 'coffee',   icon: '☕', name: 'กาแฟ' },
    { key: 'monitor',  icon: '🖥️', name: 'จอ' },
    { key: 'docs',     icon: '📚', name: 'เอกสาร' },
    { key: 'frame',    icon: '🖼️', name: 'กรอบรูป' },
  ];
  const ITEM_MAP = Object.fromEntries(ITEMS.map(i => [i.key, i]));

  let selected = null;
  let slots = [null, null, null];

  const $slots   = document.getElementById('slots');
  const $palette = document.getElementById('palette');
  const $status  = document.getElementById('status');
  const $statusText = document.getElementById('statusText');
  const $subtitle = document.getElementById('subtitle');
  const $close   = document.getElementById('closeBtn');

  function renderSlots() {
    $slots.innerHTML = '';
    slots.forEach((key, i) => {
      const el = document.createElement('div');
      el.className = 'slot' + (key ? ' filled' : '');
      const item = key && ITEM_MAP[key];
      if (item) {
        el.innerHTML = `<div class="icon">${item.icon}</div><div class="name">${item.name}</div>`;
      } else {
        el.innerHTML = `<div class="icon" style="opacity:0.35">＋</div><div class="name">ว่าง</div>`;
      }
      el.addEventListener('click', () => onSlotClick(i));
      $slots.appendChild(el);
    });
  }

  function renderPalette() {
    $palette.innerHTML = '';
    ITEMS.forEach(item => {
      const el = document.createElement('div');
      el.className = 'item' + (selected === item.key ? ' selected' : '');
      el.innerHTML = `<div class="icon">${item.icon}</div><div class="lbl">${item.name}</div>`;
      el.addEventListener('click', () => selectItem(item.key));
      $palette.appendChild(el);
    });
    const rm = document.createElement('div');
    rm.className = 'item remove' + (selected === '__remove__' ? ' selected' : '');
    rm.innerHTML = `<div class="icon">🗑️</div><div class="lbl">ลบ</div>`;
    rm.addEventListener('click', () => selectItem('__remove__'));
    $palette.appendChild(rm);
  }

  function renderStatus() {
    $status.classList.remove('active', 'danger');
    if (selected === '__remove__') {
      $status.classList.add('danger');
      $statusText.textContent = '🗑️ คลิกช่องที่มีของอยู่เพื่อลบ';
    } else if (selected) {
      const it = ITEM_MAP[selected];
      $status.classList.add('active');
      $statusText.textContent = `วาง ${it.icon} ${it.name} — คลิกช่องที่ต้องการ`;
    } else {
      $statusText.textContent = 'เลือกของตกแต่งก่อน แล้วคลิกช่องเพื่อวาง';
    }
  }

  function selectItem(key) {
    selected = (selected === key) ? null : key;
    renderPalette();
    renderStatus();
  }

  function onSlotClick(i) {
    if (!selected) return;
    if (selected === '__remove__') {
      if (!slots[i]) return;
      broadcast({ action: 'set', slot: i, item: null });
    } else {
      broadcast({ action: 'set', slot: i, item: selected });
    }
  }

  function broadcast(payload) {
    try {
      if (window.WA && WA.event && typeof WA.event.broadcast === 'function') {
        WA.event.broadcast('mimo-decor', payload);
      }
    } catch (e) { console.warn('broadcast failed', e); }
  }

  $close.addEventListener('click', () => broadcast({ action: 'close' }));

  renderSlots();
  renderPalette();
  renderStatus();
  $subtitle.textContent = '—';

  function applyState(data) {
    if (!data) return;
    if (typeof data.deskLabel === 'string') {
      $subtitle.textContent = data.deskLabel || '—';
    }
    if (Array.isArray(data.slots)) {
      slots = [0,1,2].map(i => data.slots[i] || null);
      renderSlots();
    }
  }

  if (window.WA && typeof WA.onInit === 'function') {
    WA.onInit().then(() => {
      try {
        WA.event.on('mimo-decor-state').subscribe(ev => {
          applyState(ev && ev.data ? ev.data : ev);
        });
      } catch (e) { console.warn('subscribe failed', e); }
      broadcast({ action: 'ready' });
    }).catch(err => console.warn('WA.onInit failed', err));
  }
})();
</script>
</body>
</html>
