# Upstream blocks enable keepalive connection reuse to pusher processes
upstream pusher_http {
    server 127.0.0.1:3000;
    keepalive 32;           # keep up to 32 idle connections to pusher HTTP
}

upstream pusher_ws {
    server 127.0.0.1:3001;
    keepalive 512;          # WebSocket connections are long-lived
}

server {
    listen ${PORT};

    # WebSocket at /ws/ → pusher WS port
    location /ws/ {
        proxy_pass http://pusher_ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;   # 24h — never timeout an open WS
        proxy_send_timeout 86400;
        proxy_connect_timeout 10;
    }

    # Everything else → pusher HTTP port
    location / {
        proxy_pass http://pusher_http;
        proxy_http_version 1.1;
        proxy_set_header Connection "";   # clear so nginx uses keepalive to upstream
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10;
        proxy_read_timeout 60;
        proxy_send_timeout 60;
    }
}
